<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Stabæk G17 – Spillerutvikling</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Georgia,serif;background:#F2F4F8;min-height:100vh;color:#0B1F3A}
button,input,select,textarea{font-family:inherit}
.page{padding:24px 16px}.wrap{max-width:740px;margin:0 auto}.wrap-sm{max-width:640px;margin:0 auto}
.hdr{background:linear-gradient(135deg,#0B2265,#0d2a6e 60%,#1A4B8C);border-radius:16px;padding:20px 24px;margin-bottom:16px;box-shadow:0 4px 32px rgba(11,34,101,.22);position:relative;overflow:hidden}
.hdr::after{content:'';position:absolute;right:-40px;top:-40px;width:180px;height:180px;background:radial-gradient(circle,rgba(201,168,76,.18),transparent 70%);pointer-events:none}
.hdr-row{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.hdr-left{display:flex;align-items:center;gap:12px}
.logo-box{width:48px;height:48px;border-radius:10px;cursor:pointer;border:2px dashed #C9A84C;background:rgba(201,168,76,.08);display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0;color:#C9A84C;font-size:8px;text-align:center;line-height:1.3}
.hdr-lbl{font-size:9px;letter-spacing:3px;color:#C9A84C;text-transform:uppercase;margin-bottom:2px}
.hdr-title{font-size:18px;font-weight:bold;color:#fff}
.hdr-sub{font-size:11px;color:rgba(200,208,220,.8);margin-top:2px}
.hdr-btns{display:flex;gap:8px}
.btn-hdr{padding:7px 14px;border-radius:8px;border:1px solid rgba(201,168,76,.4);background:rgba(201,168,76,.1);color:#C9A84C;font-size:12px;cursor:pointer;font-weight:bold}
.btn-icon{padding:7px 11px;border-radius:8px;border:1px solid rgba(201,168,76,.3);background:rgba(255,255,255,.08);color:#C8D0DC;font-size:14px;cursor:pointer}
.settings{margin-top:14px;padding-top:12px;border-top:1px solid rgba(201,168,76,.2)}
.settings-lbl{font-size:10px;color:#C9A84C;letter-spacing:2px;text-transform:uppercase;margin-bottom:6px}
.settings-row{display:flex;gap:8px;margin-bottom:6px}
.settings-row input{flex:1;padding:8px 12px;border:1px solid rgba(201,168,76,.3);border-radius:8px;background:rgba(255,255,255,.08);color:#fff;font-size:12px;outline:none}
.btn-gold{padding:8px 14px;border-radius:8px;border:none;background:#C9A84C;color:#0B2265;font-size:12px;cursor:pointer;font-weight:bold;white-space:nowrap}
.settings-hint{font-size:10px;color:#7A8FA8;margin-bottom:8px}
.settings-info{padding:8px 12px;border-radius:8px;font-size:11px;background:rgba(39,174,96,.08);border:1px solid rgba(39,174,96,.25);color:#1e7e34}
.btn-close-settings{margin-top:12px;width:100%;padding:8px;border-radius:8px;border:none;background:rgba(255,255,255,.08);color:#C8D0DC;font-size:12px;cursor:pointer}
.card{background:#fff;border-radius:14px;padding:20px;box-shadow:0 2px 16px rgba(11,34,101,.07);margin-bottom:12px}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}
.stat-card{background:#fff;border-radius:12px;padding:13px 10px;text-align:center;cursor:pointer;transition:all .2s;border-top:3px solid #ccc;box-shadow:0 2px 10px rgba(11,34,101,.06)}
.stat-card.active{background:#0B2265;transform:translateY(-2px);box-shadow:0 4px 20px rgba(11,34,101,.22)}
.stat-ikon{font-size:18px;margin-bottom:3px}
.stat-tall{font-size:22px;font-weight:bold;color:#0B2265}
.stat-card.active .stat-tall{color:#C9A84C}
.stat-lbl{font-size:9px;color:#7A8FA8;letter-spacing:1px;text-transform:uppercase;line-height:1.4}
.stat-card.active .stat-lbl{color:#C8D0DC}
.stat-active-lbl{font-size:8px;color:rgba(255,255,255,.4);letter-spacing:1px;margin-top:4px}
.filter-bar{display:flex;align-items:center;gap:10px;padding:9px 13px;background:#fff;border-radius:10px;box-shadow:0 2px 8px rgba(11,34,101,.07);border:1px solid #C8D0DC;margin-bottom:14px}
.btn-clear{padding:4px 10px;border-radius:8px;border:1px solid #C8D0DC;background:transparent;color:#7A8FA8;font-size:11px;cursor:pointer}
.topbar{display:flex;gap:10px;margin-bottom:14px;align-items:center;flex-wrap:wrap}
.søk-wrap{margin-bottom:12px}
.søk-inp{width:100%;padding:10px 14px;border:1px solid #C8D0DC;border-radius:10px;font-size:13px;color:#0B1F3A;background:#fff;outline:none;box-sizing:border-box}
.btn-primary{padding:9px 18px;border-radius:10px;border:none;background:#0B2265;color:#fff;font-size:13px;cursor:pointer;font-weight:bold}
.btn-outline{padding:9px 18px;border-radius:10px;border:2px solid #0B2265;background:#fff;color:#0B2265;font-size:13px;cursor:pointer;font-weight:bold}
.add-form{background:#fff;border-radius:14px;padding:20px;margin-bottom:14px;box-shadow:0 4px 20px rgba(11,34,101,.1);border:1px solid #C8D0DC}
.form-2col{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.form-3col{display:grid;grid-template-columns:2fr 80px 1fr;gap:10px;margin-bottom:12px}
.form-group label{display:block;font-size:10px;color:#7A8FA8;letter-spacing:1px;text-transform:uppercase;margin-bottom:4px}
.form-group input,.form-group select{width:100%;padding:9px 12px;border:1px solid #C8D0DC;border-radius:8px;font-size:13px;color:#0B1F3A;background:#F2F4F8;outline:none}
.form-btns{display:flex;gap:10px}
.btn-sec{padding:9px 16px;border-radius:8px;border:1px solid #C8D0DC;background:#F2F4F8;color:#7A8FA8;font-size:12px;cursor:pointer}
.btn-save{flex:1;padding:9px;border-radius:8px;border:none;background:#0B2265;color:#fff;font-size:13px;cursor:pointer;font-weight:bold}
.empty{background:#fff;border-radius:14px;padding:52px 24px;text-align:center;box-shadow:0 2px 14px rgba(11,34,101,.06)}
.empty-ikon{font-size:44px;margin-bottom:14px}
.empty h3{font-size:17px;font-weight:bold;color:#0B1F3A;margin-bottom:8px}
.empty p{font-size:13px;color:#7A8FA8}
.group-hdr{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.group-circle{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.group-label{font-size:15px;font-weight:bold;color:#0B1F3A}
.group-count{font-size:12px;color:#7A8FA8}
.group-line{height:1px;flex:1;background:#C8D0DC}
.p-card{background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 2px 12px rgba(11,34,101,.07);cursor:pointer;transition:all .18s;margin-bottom:8px;border-left:4px solid #ccc}
.p-card-inner{display:flex;align-items:center;gap:12px;padding:13px 16px;flex-wrap:wrap}
.p-avatar{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:bold;color:#C9A84C;flex-shrink:0;background:linear-gradient(135deg,#0B2265,#1A4B8C)}
.p-info{min-width:140px;flex-shrink:0}
.p-name{font-weight:bold;font-size:14px;margin-bottom:2px}
.p-pos{font-size:11px;color:#7A8FA8}
.p-mal{flex:1;min-width:120px;font-size:12px;color:#0B1F3A;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.p-mal.none{font-style:italic;color:#C8D0DC}
.p-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.p-count{text-align:center;min-width:32px}
.p-count-n{font-size:17px;font-weight:bold}
.p-count-l{font-size:9px;color:#7A8FA8;letter-spacing:1px}
.status-chip{display:inline-flex;align-items:center;gap:5px;padding:4px 9px;border-radius:20px;font-size:10px;white-space:nowrap;min-width:90px}
.status-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.chevron{font-size:15px;color:#C9A84C;opacity:.4}
.profile-hdr{background:linear-gradient(135deg,#0B2265,#0d2a6e 60%,#1A4B8C);border-radius:16px;padding:20px 24px;margin-bottom:14px;box-shadow:0 4px 24px rgba(11,34,101,.2);position:relative;overflow:hidden}
.profile-hdr::after{content:'';position:absolute;right:-40px;top:-40px;width:200px;height:200px;background:radial-gradient(circle,rgba(201,168,76,.15),transparent 70%);pointer-events:none}
.profile-hdr-row{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.p-big-av{width:50px;height:50px;border-radius:50%;background:linear-gradient(135deg,#C9A84C,#E8C96A);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:bold;color:#0B2265;flex-shrink:0}
.p-stats-row{display:flex;gap:16px}
.p-stat{text-align:center}
.p-stat-n{font-size:20px;font-weight:bold;color:#C9A84C}
.p-stat-l{font-size:9px;color:#7A8FA8;letter-spacing:1px;text-transform:uppercase}
.two-btns{display:flex;gap:10px;margin-bottom:14px}
.two-btns button{flex:1;padding:12px;border-radius:10px;font-size:13px;cursor:pointer;font-weight:bold}
.kat-tabs{display:flex;background:#fff;border-radius:12px;padding:4px;gap:3px;margin-bottom:12px;box-shadow:0 2px 10px rgba(11,34,101,.07)}
.kat-tab{flex:1;padding:8px 4px;border-radius:9px;border:none;cursor:pointer;background:transparent;transition:all .2s;display:flex;flex-direction:column;align-items:center;gap:2px}
.kat-tab.active{color:#fff}
.kat-tab-ikon{font-size:15px}
.kat-tab-lbl{font-size:10px;color:#7A8FA8}
.kat-tab.active .kat-tab-lbl{font-weight:bold;color:#fff}
.kat-tab-ant{font-size:9px;color:#7A8FA8}
.goal-card{background:#fff;border-radius:12px;box-shadow:0 2px 12px rgba(11,34,101,.08);overflow:hidden;cursor:pointer;margin-bottom:8px;border-left:4px solid #ccc;transition:all .2s}
.goal-hdr{display:flex;align-items:flex-start;gap:10px;padding:12px 14px}
.goal-ikon{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;border:2px solid #C8D0DC;flex-shrink:0;background:#F2F4F8;color:#0B2265;transition:all .2s;margin-top:2px}
.goal-ikon.open{background:#0B2265;color:#C9A84C;border-color:#C9A84C}
.goal-text{flex:1}
.goal-badges{display:flex;align-items:center;gap:6px;margin-bottom:4px;flex-wrap:wrap}
.pri-badge{font-size:10px;letter-spacing:1px;text-transform:uppercase;padding:2px 9px;border-radius:20px}
.spf-badge{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:20px;font-size:11px}
.goal-focus{font-size:13px;font-weight:bold;color:#0B1F3A;margin-bottom:2px;line-height:1.4}
.goal-label{font-size:11px;color:#7A8FA8;font-style:italic}
.goal-chevron{font-size:16px;color:#C9A84C;opacity:.35;transition:transform .22s;flex-shrink:0;margin-top:4px}
.goal-chevron.open{opacity:1;transform:rotate(90deg)}
.goal-detail{border-top:1px solid #C8D0DC}
.detail-tabs{display:flex;background:#F2F4F8;border-bottom:1px solid #C8D0DC}
.detail-tab{flex:1;padding:9px 4px;border:none;border-bottom:3px solid transparent;background:transparent;color:#7A8FA8;font-size:11px;cursor:pointer;font-family:inherit}
.detail-tab.active{color:#0B2265;font-weight:bold;border-bottom-color:#C9A84C}
.detail-body{padding:14px 16px;background:#fff}
.detail-body p{font-size:13px;color:#0B1F3A;line-height:1.85}
.detail-item{display:flex;gap:10px;align-items:flex-start;padding:9px 12px;background:#F2F4F8;border-radius:9px;margin-bottom:8px}
.detail-num{min-width:22px;height:22px;border-radius:50%;background:#0B2265;color:#C9A84C;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:bold;flex-shrink:0}
.detail-item p{margin:0;font-size:13px;color:#0B1F3A;line-height:1.7}
.detail-item.maling{border-left:3px solid #C9A84C}
.detail-empty{font-size:12px;color:#7A8FA8;font-style:italic;padding:4px 0}
.dream{background:#0B2265;border-radius:10px;padding:13px 16px;display:flex;align-items:flex-start;gap:10px;margin-top:10px}
.dream p{margin:0;font-size:12px;font-style:italic;color:#F8F5EE;line-height:1.8}
.dream-lbl{font-size:9px;color:#C9A84C;letter-spacing:2px;text-transform:uppercase;margin-bottom:4px}
.notat-box{background:rgba(201,168,76,.07);border-radius:9px;padding:9px 12px;margin-bottom:10px;border-left:3px solid #C9A84C}
.notat-lbl{font-size:9px;color:#C9A84C;letter-spacing:2px;text-transform:uppercase;margin-bottom:3px}
.notat-box p{margin:0;font-size:12px;color:#0B1F3A;line-height:1.75;font-style:italic}
.conv-stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px}
.conv-stat{background:#fff;border-radius:10px;padding:10px 8px;text-align:center;box-shadow:0 2px 8px rgba(11,34,101,.06);border-top:3px solid #C8D0DC}
.conv-stat.has{border-top-color:var(--farge)}
.conv-stat-ikon{font-size:16px;margin-bottom:2px}
.conv-stat-n{font-size:17px;font-weight:bold;color:#7A8FA8}
.conv-stat.has .conv-stat-n{color:#0B2265}
.conv-stat-l{font-size:9px;color:#7A8FA8;letter-spacing:1px;text-transform:uppercase;line-height:1.4}
.section-lbl{font-size:10px;color:#C9A84C;letter-spacing:2px;text-transform:uppercase;margin-bottom:10px}
.conv-row{background:#fff;border-radius:12px;box-shadow:0 2px 10px rgba(11,34,101,.06);overflow:hidden;margin-bottom:10px}
.conv-hdr-row{display:flex;align-items:center;border-left:4px solid #1A4B8C}
.conv-hdr-row.open{border-left-color:#C9A84C}
.conv-clickable{flex:1;padding:13px 16px;cursor:pointer;display:flex;align-items:center;gap:10px}
.conv-num{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:bold;border:2px solid #C8D0DC;background:#F2F4F8;color:#0B2265;flex-shrink:0}
.conv-num.open{background:#0B2265;color:#C9A84C;border-color:#C9A84C}
.conv-meta{flex:1}
.conv-title-row{display:flex;align-items:center;gap:7px;margin-bottom:3px;flex-wrap:wrap}
.conv-title{font-size:13px;font-weight:bold;color:#0B1F3A}
.type-badge{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:20px;font-size:10px;white-space:nowrap}
.conv-detail-row{display:flex;gap:8px;flex-wrap:wrap}
.conv-detail-row span{font-size:11px;color:#7A8FA8}
.conv-chevron{font-size:16px;color:#C9A84C;opacity:.4;transition:transform .2s}
.conv-chevron.open{opacity:1;transform:rotate(90deg)}
.conv-edit-btn{padding:13px 11px;border:none;background:transparent;cursor:pointer;color:#7A8FA8;font-size:14px;border-left:1px solid #C8D0DC}
.conv-del-btn{padding:13px 9px;border:none;background:transparent;cursor:pointer;color:#ffaaaa;font-size:13px}
.conv-body{border-top:1px solid #C8D0DC;padding:14px 16px;background:#F2F4F8}
.form-lbl{font-size:10px;color:#7A8FA8;letter-spacing:1px;text-transform:uppercase;margin-bottom:4px}
.form-input{width:100%;padding:8px 10px;border:1px solid #C8D0DC;border-radius:8px;font-size:13px;color:#0B1F3A;background:#F2F4F8;outline:none;box-sizing:border-box}
.form-textarea{width:100%;padding:8px 10px;border:1px solid #C8D0DC;border-radius:8px;font-size:13px;color:#0B1F3A;background:#F2F4F8;outline:none;resize:vertical;box-sizing:border-box;font-family:inherit}
.form-select{width:100%;padding:8px 10px;border:1px solid #C8D0DC;border-radius:8px;font-size:13px;color:#0B1F3A;background:#F2F4F8;outline:none}
.mal-form{background:#fff;border-radius:12px;padding:18px;margin-bottom:12px;box-shadow:0 2px 12px rgba(11,34,101,.07);border-left:4px solid #C9A84C}
.mal-form-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.mal-form-title{font-size:13px;font-weight:bold;color:#0B1F3A}
.btn-slett-mal{padding:3px 10px;border-radius:6px;border:1px solid #ffaaaa;background:transparent;color:#c0392b;font-size:11px;cursor:pointer}
.alert{padding:9px 12px;border-radius:8px;font-size:12px;margin-top:8px}
.alert-red{background:rgba(231,76,60,.08);border:1px solid rgba(231,76,60,.3);color:#c0392b}
.alert-yellow{background:rgba(201,168,76,.08);border:1px solid rgba(201,168,76,.3);color:#8a6800}
.alert-green{background:rgba(39,174,96,.08);border:1px solid rgba(39,174,96,.3);color:#1e7e34}
.tab-switch{display:flex;background:#fff;border-radius:12px;padding:4px;gap:3px;margin-bottom:14px;box-shadow:0 2px 10px rgba(11,34,101,.07)}
.tab-btn{flex:1;padding:10px;border-radius:9px;border:none;cursor:pointer;font-size:13px;background:transparent;color:#7A8FA8;font-family:inherit;transition:all .2s}
.tab-btn.active{background:#0B2265;color:#fff;font-weight:bold}
.upload-zone{border:2px dashed #C8D0DC;border-radius:12px;padding:32px 24px;text-align:center;cursor:pointer;background:#F2F4F8;margin-bottom:12px;transition:all .2s}
.result-wrap{background:#fff;border-radius:12px;overflow:hidden;margin-bottom:12px}
.result-hdr{padding:14px 18px;border-bottom:1px solid #C8D0DC}
.result-band{background:#0B2265;padding:9px 16px}
.result-band-lbl{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:#C9A84C;border-bottom:2px solid #C9A84C;padding-bottom:3px;display:inline-block}
.result-goal{display:flex;align-items:flex-start;gap:10px;padding:12px 16px;border-bottom:1px solid #C8D0DC}
.result-goal:last-child{border-bottom:none}
.result-goal-ikon{font-size:16px;flex-shrink:0;margin-top:1px}
.result-goal-title{font-size:13px;font-weight:bold;color:#0B1F3A;margin-bottom:2px}
.result-goal-spf{font-size:11px;color:#1A4B8C;margin-bottom:2px}
.result-goal-desc{font-size:12px;color:#7A8FA8}
.btn-back{display:inline-flex;align-items:center;gap:8px;padding:10px 18px;border-radius:10px;border:1px solid #C8D0DC;background:#fff;color:#0B2265;font-size:14px;cursor:pointer;font-weight:bold;box-shadow:0 2px 8px rgba(11,34,101,.07);margin-bottom:14px;font-family:inherit}
.btn-danger{padding:7px 14px;border-radius:8px;border:1px solid #ffaaaa;background:transparent;color:#c0392b;font-size:11px;cursor:pointer;font-family:inherit}
.btn-print{padding:8px 14px;border-radius:8px;border:1px solid #C8D0DC;background:#fff;color:#0B2265;font-size:11px;cursor:pointer;font-family:inherit}
.no-conv{background:#fff;border-radius:14px;padding:36px 24px;text-align:center;box-shadow:0 2px 14px rgba(11,34,101,.06)}
.bottom-row{display:flex;justify-content:space-between;align-items:center;margin-top:12px;gap:10px}
.kal-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:16px}
.kal-dag{background:#fff;border-radius:12px;min-height:120px;padding:10px;box-shadow:0 2px 8px rgba(11,34,101,.06);border-top:3px solid #C8D0DC}
.kal-dag.harIdag{border-top-color:#C9A84C;box-shadow:0 2px 12px rgba(201,168,76,.2)}
.kal-dag-hdr{font-size:11px;font-weight:bold;color:#7A8FA8;letter-spacing:1px;text-transform:uppercase;margin-bottom:2px}
.kal-dag-dato{font-size:14px;font-weight:bold;color:#0B1F3A;margin-bottom:8px}
.kal-dag.harIdag .kal-dag-dato{color:#C9A84C}
.kal-item{display:flex;align-items:center;gap:5px;padding:4px 7px;border-radius:8px;margin-bottom:4px;font-size:11px;cursor:pointer;transition:opacity .15s}
.kal-item:hover{opacity:.8}
.kal-item-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.kal-item-txt{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.kal-item-status{font-size:9px;opacity:.8}
.kal-tom{font-size:11px;color:#C8D0DC;font-style:italic;text-align:center;padding:12px 0}
.kal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.kal-nav-btn{padding:8px 16px;border-radius:9px;border:1px solid #C8D0DC;background:#fff;color:#0B2265;font-size:13px;cursor:pointer;font-weight:bold;font-family:inherit}
.kal-nav-tittel{font-size:15px;font-weight:bold;color:#0B1F3A}
.plan-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:20px;font-size:10px;margin-bottom:3px}
@media(max-width:600px){.kal-grid{grid-template-columns:1fr 1fr;}.kal-grid>*:last-child{grid-column:1/-1}}
.footer{text-align:center;margin-top:18px;font-size:10px;color:#C8D0DC;letter-spacing:1px}

const SYSTEM_PROMPT=`Du er spillerutviklingsassistent for Stabæk Fotball G17.

ABSOLUTT REGEL: Hent KUN informasjon som faktisk ble sagt i samtalen. Aldri finn på. Tomt felt er bedre enn oppfunnet innhold.

FASE-VEILEDNING:
NØKKELSKILLE: PRESSE motstanderen = Pressefase. SPILLE UT UNDER motstanderens press = Byggefase.

Angrepsspill (du har ball):
- Byggefase: frispilling, bygge ut, keeperpress, spille mot press, finne fri mann under motstanders press
- Kontrollfasen: holde ball rolig, dominere, ballsirkulasjon, veksle side uten press
- Skape og Scorefasen: avslutning, innlegg, 1.stang, ankomstspill, kantspill, score

Forsvarsspill (motstander har ball):
- Gjenvinne: de FØRSTE 5 sekundene etter balltap, umiddelbar gjenvinningsreaksjon
- Pressefase: organisert press fra ditt lag, presstriggere, kjedereaksjon, koordinert
- Forsvare boks: nær eget mål, innlegg, markeringer, 1F/2F/3F, dødball

Overgangsspill:
- Overgang til angrep: kontring, start sprint ved ballvinn, hurtig frem i brudd
- Overgang til forsvar: falle av, retrett, gi rom bak ved balltap

Kategorier:
- fotball: tekniske/taktiske ferdigheter
- mentalitet: eget tankesett (robusthet, fokus, gi seg, resette seg)
- kultur: atferd mot andre (heie frem, stemme, lagsatmosfære)
- fysisk: kropp og kondisjon

10 EKSEMPLER:
T01 Finne fri mann når keeper har ball = Byggefase/fotball
T02 Presse samordnet og lese presstriggere = Pressefase/fotball
T03 For sen med å snu rett etter balltap = Gjenvinne/fotball
T04 For sen med å starte løp ved ballvinn = Overgang til angrep/fotball
T05 Holde ball rolig uten hastverk = Kontrollfasen/fotball
T06 1F-prinsipp ved innlegg nær mål = Forsvare boks/fotball
T07 Gir seg etter feil, trenger robusthet = mentalitet
T08 For stille, heie frem lagkameratene = kultur
T09 Henger igjen offensivt ved balltap = Overgang til forsvar/fotball
T10 Avslutte på 1.stang ved kantspill = Skape og Scorefasen/fotball

FELTFORKLARING:
- tittel: Teknikken/fokusområdet, maks 4 ord
- kortbeskrivelse: Skriv DIREKTE TIL SPILLEREN med "du". "Du skal bli bedre på..." ikke "Spilleren skal..."
- detaljer.mal: Beskriv ferdighetsgapet og målet. Aldri gjenta tittel. Gi kontekst og dybde.
- detaljer.tiltak: HENT ALLE tiltak nevnt i samtalen. Minst 1 hvis noe om fremover ble sagt. Foreslå enkelt tiltak basert på målet hvis ingen nevnt eksplisitt.
- detaljer.maling: Hent måleparametere. Foreslå enkel egenvurdering hvis ingen nevnt.

RETURNER KUN dette JSON:
{"drommeMal":"","type":"Spillersamtale","mal":[{"tittel":"","kortbeskrivelse":"","prioritet":"Høy","kategori":"fotball","spillfase":"","ikon":"🎯","detaljer":{"mal":"","tiltak":[],"maling":[]}}]}`;

function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,5)}
function oppfølgingStatus(convs,type,intervall){
  const alle=convs.filter(c=>c.type===type).map(c=>dagTall(c.dato)).filter(n=>n<999).sort((a,b)=>a-b);
  if(!alle.length)return{status:'aldri',dager:null,txt:'Aldri gjennomført',dot:'#e74c3c',pst:100};
  const d=alle[0];
  const igjen=intervall-d;
  const pst=Math.min(100,Math.round((d/intervall)*100));
  if(igjen>3) return{status:'ok',    dager:igjen, txt:igjen+' dager igjen',  dot:'#27ae60',pst};
  if(igjen>=0)return{status:'snart', dager:igjen, txt:igjen===0?'I dag!':igjen+' dag'+(igjen!==1?'er':'')+' igjen',dot:'#f39c12',pst};
  return       {status:'forfalt',dager:Math.abs(igjen),txt:Math.abs(igjen)+' dag'+(Math.abs(igjen)!==1?'er':'')+' forfalt',dot:'#e74c3c',pst:100};
}
function gruppeFor(pos){return GRUPPER.find(g=>g.pos.includes(pos))||{label:"Andre",ikon:"👟",farge:C.grey}}
function today(){const d=new Date();return d.getDate()+'.'+(d.getMonth()+1)+'.'+d.getFullYear()}
function parseDato(dato){
  if(!dato)return null;
  if(dato.includes('-')&&dato.length===10)return new Date(dato);
  const p=dato.split('.');
  if(p.length<3)return null;
  return new Date(p[2]+'-'+p[1].padStart(2,'0')+'-'+p[0].padStart(2,'0'));
}
function dagTall(dato){
  if(!dato)return 999;
  const d=parseDato(dato);
  if(!d||isNaN(d))return 999;
  const v=Math.floor((Date.now()-d)/86400000);
  return v<0?999:v;
}
function formatDato(dato){
  if(!dato)return '';
  if(dato.includes('-')&&dato.length===10){const[y,m,d]=dato.split('-');return d+'.'+m+'.'+y;}
  return dato;
}
function statusFor(dato){
  const d=dagTall(dato);
  if(d===999)return{bg:"rgba(231,76,60,.1)",txt:"#b03a2e",border:"rgba(231,76,60,.35)",lbl:"Ingen samtale",dot:"#e74c3c"};
  if(d<=14)  return{bg:"rgba(39,174,96,.1)", txt:"#1e7e34",border:"rgba(39,174,96,.35)", lbl:"Siste 2 uker",   dot:"#27ae60"};
  if(d<=35)  return{bg:"rgba(243,156,18,.1)",txt:"#b7770a",border:"rgba(243,156,18,.35)",lbl:"3–5 uker siden",  dot:"#f39c12"};
  return      {bg:"rgba(231,76,60,.1)", txt:"#b03a2e",border:"rgba(231,76,60,.35)",lbl:"Over 6 uker",   dot:"#e74c3c"};
}
function el(tag,attrs,children){
  const e=document.createElement(tag);
  for(const[k,v]of Object.entries(attrs||{})){
    if(k==='style'&&typeof v==='object')Object.assign(e.style,v);
    else if(k.startsWith('on'))e[k.toLowerCase()]=v;
    else if(k==='className')e.className=v;
    else e.setAttribute(k,v);
  }
  if(typeof children==='string')e.textContent=children;
  else if(Array.isArray(children))children.filter(Boolean).forEach(c=>e.appendChild(typeof c==='string'?document.createTextNode(c):c));
  else if(children&&typeof children==='object'&&children.tag!==undefined)e.appendChild(children);
  return e;
}
function div(attrs,children){return el('div',attrs,children)}
function btn(attrs,txt){const b=el('button',attrs);b.textContent=txt;return b}
function inp(attrs){return el('input',attrs)}
function txt2(attrs){return el('textarea',attrs)}

const S={
  view:'overview',prevView:'overview',kalUke:0,players:LS.gp(),selected:null,convs:[],
  filter:'alle',søk:'',showAdd:false,logo:LS.glogo(),apiKey:LS.gkey(),showSettings:false,

  samtaleNotat:'',samtaleDrøm:'',mal:[],analyseTekst:'',analyzing:false,

function render(){
  const app=document.getElementById('app');app.innerHTML='';

    if(S.view==='overview')v=renderOverview();
    else if(S.view==='oppfølging')v=renderOppfølging();

    else if(S.view==='player')v=renderPlayer();
    else if(S.view==='new-conv')v=renderNewConv();
    else if(S.view==='edit-conv')v=renderEditConv();

    app.innerHTML='<div style="padding:32px;font-family:monospace;background:#fff0f0;color:#c0392b;border-radius:12px;margin:24px;font-size:13px"><b>Feil i ' + S.view + ':</b><br><br>' + err.message + '<br><br><small>' + (err.stack||'').split('\n').slice(0,4).join('<br>') + '</small></div>';
    console.error('Render error in view='+S.view, err);
  }
}

function renderHeader(title,sub,onBack){
  const hdr=div({className:'hdr'});
  const row=div({className:'hdr-row'});
  const left=div({className:'hdr-left'});
  const linp=inp({type:'file',accept:'image/*',style:{display:'none'}});
  linp.onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{LS.slogo(ev.target.result);setState({logo:ev.target.result});};r.readAsDataURL(f);};
  const lbox=div({className:'logo-box',title:'Last opp logo'});
  if(S.logo){const img=document.createElement('img');img.src=S.logo;img.style.cssText='width:100%;height:100%;object-fit:contain';lbox.appendChild(img);}
  else lbox.textContent='Logo';
  lbox.onclick=()=>linp.click();left.appendChild(linp);left.appendChild(lbox);
  const info=div({});
  info.appendChild(div({className:'hdr-lbl'},'Stabæk Fotball · G17'));
  info.appendChild(div({className:'hdr-title'},title));
  if(sub)info.appendChild(div({className:'hdr-sub'},sub));
  left.appendChild(info);
  const btns=div({className:'hdr-btns'});
  if(onBack){const bb=btn({className:'btn-hdr'},onBack.label||'← Tilbake');bb.onclick=onBack.fn;btns.appendChild(bb);}
  const gb=btn({className:'btn-icon',title:'Innstillinger'},'⚙️');
  gb.onclick=()=>setState({showSettings:!S.showSettings});
  btns.appendChild(gb);row.appendChild(left);row.appendChild(btns);hdr.appendChild(row);
  if(S.showSettings){
    const s=div({className:'settings'});
    s.appendChild(div({className:'settings-lbl'},'Groq API-nøkkel (gratis)'));
    const sr=div({className:'settings-row'});
    const ki=inp({type:'password',placeholder:'gsk_...'});ki.value=S.apiKey||'';
    const sb=btn({className:'btn-gold'},'Lagre');
    sb.onclick=()=>{const v=ki.value.trim();S.apiKey=v;LS.skey(v);sb.textContent='✓ Lagret!';sb.style.background='#27ae60';setTimeout(()=>{sb.textContent='Lagre';sb.style.background='';},2000);};
    sr.appendChild(ki);sr.appendChild(sb);s.appendChild(sr);
    s.appendChild(div({className:'settings-hint'},'Hent gratis nøkkel på console.groq.com → API Keys → Create · Ingen betalingskort'));
    s.appendChild(div({className:'settings-info'},'✅ Stabæks fagplan, spillfaser og fagspråk er innebygd i systemet'));
    const cb=btn({className:'btn-close-settings'},'✕ Lukk');cb.onclick=()=>setState({showSettings:false});s.appendChild(cb);
    hdr.appendChild(s);
  }
  return hdr;
}

function renderOverview(){
  const page=div({className:'page'});const wrap=div({className:'wrap'});page.appendChild(wrap);
  const total=S.players.reduce((s,p)=>s+(p.ant||0),0);
  wrap.appendChild(renderHeader('Spilleroversikt',S.players.length+' spillere · '+total+' samtaler'));
  if(S.players.length>0){
    const gr=S.players.filter(p=>dagTall(p.sist)<=14).length;
    const ro=S.players.filter(p=>dagTall(p.sist)>35).length;
    const sg=div({className:'stats-grid'});
    [{id:'alle',ikon:'👥',tall:S.players.length,lbl:'Spillere',farge:C.navy},
     {id:'samtaler',ikon:'💬',tall:total,lbl:'Samtaler',farge:C.blue},
     {id:'grønn',ikon:'🟢',tall:gr,lbl:'Aktive 2 uker',farge:'#27ae60'},
     {id:'rød',ikon:'🔴',tall:ro,lbl:'Trenger oppfølging',farge:'#e74c3c'},
    ].forEach(s=>{
      const ac=S.filter===s.id;
      const c=div({className:'stat-card'+(ac?' active':'')});
      c.style.borderTopColor=s.farge;
      c.appendChild(div({className:'stat-ikon'},s.ikon));
      c.appendChild(div({className:'stat-tall'},String(s.tall)));
      c.appendChild(div({className:'stat-lbl'},s.lbl));
      if(ac)c.appendChild(div({className:'stat-active-lbl'},'AKTIVT FILTER'));
      c.onclick=()=>setState({filter:ac?'alle':s.id});
      sg.appendChild(c);
    });
    wrap.appendChild(sg);
  }
  if(S.players.length>0){
    const sw=div({className:'søk-wrap'});
    const si=inp({className:'søk-inp',placeholder:'🔍  Søk etter spiller eller posisjon...'});
    si.value=S.søk||'';si.oninput=e=>{S.søk=e.target.value;render();};
    sw.appendChild(si);wrap.appendChild(sw);
  }
  // Oppfølgings-navigasjon
  const navRow=div({style:{display:'flex',gap:'10px',marginBottom:'14px'}});
  [{v:'overview',lbl:'👥 Oversikt'},{v:'oppfølging',lbl:'📅 Oppfølgingsplan'},{v:'kalender',lbl:'🗓️ Kalender'}].forEach(t=>{
    const tb=btn({style:{flex:1,padding:'10px',borderRadius:'10px',border:S.view===t.v?'2px solid '+C.navy:'2px solid #C8D0DC',background:S.view===t.v?C.navy:'#fff',color:S.view===t.v?'#fff':C.navy,fontSize:'12px',cursor:'pointer',fontWeight:'bold',fontFamily:'inherit'}},t.lbl);
    tb.onclick=()=>setState({view:t.v});navRow.appendChild(tb);
  });wrap.appendChild(navRow);

  const topbar=div({className:'topbar'});
  const ab=btn({className:'btn-primary'},S.showAdd?'✕ Avbryt':'+ Legg til spiller');
  ab.onclick=()=>setState({showAdd:!S.showAdd});topbar.appendChild(ab);
  if(S.filter!=='alle'){
    const fb=div({className:'filter-bar',style:{flex:'1'}});
    const fs=document.createElement('span');
    fs.textContent=S.filter==='grønn'?'🟢 Aktive siste 2 uker':S.filter==='rød'?'🔴 Ingen samtale / over 6 uker':'💬 Sortert etter flest samtaler';
    fs.style.flex='1';fs.style.fontSize='13px';
    const xb=btn({className:'btn-clear'},'Vis alle ✕');xb.onclick=()=>setState({filter:'alle'});
    fb.appendChild(fs);fb.appendChild(xb);topbar.appendChild(fb);
  }
  wrap.appendChild(topbar);
  if(S.showAdd){
    const af=div({className:'add-form'});
    af.appendChild(div({style:{fontSize:'13px',fontWeight:'bold',color:C.text,marginBottom:'14px'}},'Ny spiller'));
    const fg=div({className:'form-3col'});
    const ng=div({className:'form-group'});ng.innerHTML='<label>Navn *</label>';
    const ni=inp({className:'form-input',placeholder:'Fornavn Etternavn'});ng.appendChild(ni);
    const ag=div({className:'form-group'});ag.innerHTML='<label>Alder</label>';
    const ai=inp({className:'form-input',type:'number',placeholder:'17'});ag.appendChild(ai);
    const pg=div({className:'form-group'});pg.innerHTML='<label>Posisjon *</label>';
    const ps=document.createElement('select');ps.className='form-select';
    ps.innerHTML='<option value="">Velg</option>';
    GRUPPER.forEach(g=>ps.innerHTML+=`<optgroup label="${g.ikon} ${g.label}">${g.pos.map(x=>`<option value="${x}">${x}</option>`).join('')}</optgroup>`);
    pg.appendChild(ps);fg.appendChild(ng);fg.appendChild(ag);fg.appendChild(pg);af.appendChild(fg);
    const fb2=div({className:'form-btns'});
    const avb=btn({className:'btn-sec'},'Avbryt');avb.onclick=()=>setState({showAdd:false});
    const svb=btn({className:'btn-save'},'Lagre spiller');
    svb.onclick=()=>{
      if(!ni.value.trim()||!ps.value)return;
      const ny={id:uid(),navn:ni.value.trim(),alder:parseInt(ai.value)||0,posisjon:ps.value,dato:today(),ant:0,sist:null};
      const op=[...S.players,ny];LS.sp(op);setState({players:op,showAdd:false});
    };
    fb2.appendChild(avb);fb2.appendChild(svb);af.appendChild(fb2);wrap.appendChild(af);
  }
  if(S.players.length===0){
    const em=div({className:'empty'});em.appendChild(div({className:'empty-ikon'},'👥'));
    em.appendChild(el('h3',{},'Ingen spillere ennå'));
    em.appendChild(el('p',{},'Trykk «+ Legg til spiller» for å komme i gang.'));
    wrap.appendChild(em);
  } else {
    GRUPPER.forEach(g=>{
      let sp=S.players.filter(p=>g.pos.includes(p.posisjon));
      if(S.søk)sp=sp.filter(p=>p.navn.toLowerCase().includes(S.søk.toLowerCase())||p.posisjon.toLowerCase().includes(S.søk.toLowerCase()));
      if(S.filter==='grønn')sp=sp.filter(p=>dagTall(p.sist)<=14);
      if(S.filter==='rød')sp=sp.filter(p=>dagTall(p.sist)>35);
      if(S.filter==='samtaler')sp=[...sp].sort((a,b)=>b.ant-a.ant);
      if(!sp.length)return;
      const grp=div({style:{marginBottom:'20px'}});
      const gh=div({className:'group-hdr'});
      const gc2=div({className:'group-circle',style:{background:g.farge}});gc2.textContent=g.ikon;
      gh.appendChild(gc2);gh.appendChild(div({className:'group-label'},g.label));
      gh.appendChild(div({className:'group-count'},'· '+sp.length+' spiller'+(sp.length!==1?'e':'')));
      gh.appendChild(div({className:'group-line'}));grp.appendChild(gh);
      sp.forEach(p=>{
        const st=statusFor(p.sist);
        const c0=LS.gc(p.id);
        const smm=[...c0].reverse().find(s=>(s.mal||[]).some(m=>m.tittel?.trim()));
        const akt=smm?.mal?.[0];
        const kat=KATEGORIER.find(k=>k.id===akt?.kategori);
        const pc=div({className:'p-card',style:{borderLeftColor:g.farge}});
        pc.onmouseenter=()=>{pc.style.boxShadow='0 6px 20px rgba(11,34,101,.13)';pc.style.borderLeftColor=C.gold;};
        pc.onmouseleave=()=>{pc.style.boxShadow='';pc.style.borderLeftColor=g.farge;};
        pc.onclick=()=>setState({selected:p,convs:LS.gc(p.id),view:'player',expandedConv:null,trendData:null,trendFeil:''});
        const pi=div({className:'p-card-inner'});
        const av=div({className:'p-avatar'});av.textContent=p.navn.charAt(0);

async function analyser(){
  if(S.analyzing)return;
  if(!S.analyseTekst?.trim()||!S.apiKey){setState({convFeil:'Fyll inn transkripsjon og API-nøkkel.'});return;}
  setState({analyzing:true,convFeil:'',convResult:null});
  try{
    const res=await fetch('https://api.groq.com/openai/v1/chat/completions',{
      method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+S.apiKey},
      body:JSON.stringify({model:'llama-3.3-70b-versatile',max_tokens:2000,temperature:0.1,
        messages:[{role:'system',content:SYSTEM_PROMPT},{role:'user',content:'Spiller: '+S.selected.navn+', '+S.selected.alder+' år, '+S.selected.posisjon+'.\n\nSamtale:\n'+S.analyseTekst}]})
    });
    const json=await res.json();
    if(json.error)throw new Error(json.error.message||String(json.error));
    const raw=json.choices?.[0]?.message?.content||'';
    const s=raw.indexOf('{'),e=raw.lastIndexOf('}');
    if(s===-1||e===-1)throw new Error('Ingen JSON i svaret. Prøv igjen med lengre transkripsjon.');
    let parsed;
    try{parsed=JSON.parse(raw.slice(s,e+1).replace(/\r/g,'').replace(/\t/g,' '));}
    catch(pe){throw new Error('Svaret var ikke gyldig JSON. Prøv igjen.');}
    setState({convResult:parsed,analyzing:false});
  }catch(err){setState({analyzing:false,convFeil:err.message});}
}

async function transkriber(){
  if(S.transkriberer||!S.lydFil||!S.apiKey)return;
  setState({transkriberer:true,transkFeil:'',convResult:null,convFeil:''});
  try{
    const buf=await S.lydFil.arrayBuffer();
    const blob=new Blob([buf],{type:S.lydFil.type||'audio/m4a'});
    const fd=new FormData();fd.append('file',blob,S.lydFil.name);fd.append('model','whisper-large-v3-turbo');fd.append('language','no');fd.append('response_format','text');
    const res=await fetch('https://api.groq.com/openai/v1/audio/transcriptions',{method:'POST',headers:{'Authorization':'Bearer '+S.apiKey},body:fd});
    if(!res.ok){const e=await res.json().catch(()=>({}));throw new Error(e?.error?.message||res.statusText);}
    const tekst=await res.text();
    if(!tekst?.trim())throw new Error('Tom transkripsjon. Sjekk at lydfilen har norsk tale.');
    setState({transkriberer:false,analyseTekst:tekst.trim()});
    await analyser();
  }catch(err){setState({transkriberer:false,transkFeil:err.message});}
}

// ── Kalender-hjelper ──────────────────────────────────────────────────────────
function mandagForUke(offset){
  const d=new Date();
  const day=d.getDay();
  const diff=d.getDate()-(day===0?6:day-1)+(offset*7);
  return new Date(d.setDate(diff));
}
function datoStr(d){return d.getDate()+'.'+(d.getMonth()+1)+'.'+d.getFullYear();}
function datoStrKort(d){return d.getDate()+'.'+(d.getMonth()+1);}
function erIdag(d){const i=new Date();return d.getDate()===i.getDate()&&d.getMonth()===i.getMonth()&&d.getFullYear()===i.getFullYear();}

function genererUkesplan(mandag){
  const todo=[];
  S.players.forEach(p=>{
    const convs=LS.gc(p.id);
    OPPFØLGING_REGLER.forEach(r=>{
      const st=oppfølgingStatus(convs,r.type,r.intervall);
      if(st.status==='aldri'||st.status==='forfalt'||st.status==='snart'||(st.status==='ok'&&st.dager<=14)){
        const hastegrad=st.status==='aldri'?-999:st.status==='forfalt'?-st.dager:st.dager;
        todo.push({p,r,st,hastegrad});
      }
    });
  });
  todo.sort((a,b)=>a.hastegrad-b.hastegrad);

  // Tir(1)=3, Tor(3)=3, Fre(4)=1
  const dagMaks=[0,3,0,3,1];
  const plan=[[],[],[],[],[]];
  const dagPref={
    'Spillersamtale':[3,4,1],   // Tor helst – gir ro til grundig samtale
    'Videosamtale':  [1,3],     // Tir – naturlig på treningsdag
    'Innsjekk':      [3,1],     // Tor – kort, etter trening
    'Kampgjennomgang':[1,3],
    'Treningssamtale':[1,3,4],
  };
  // KRITISK: Spor hvilke dager hver spiller allerede er satt opp
  const spillerDager={};

  todo.forEach(item=>{
    const pid=item.p.id;
    const booked=spillerDager[pid]||[];
    const pref=dagPref[item.r.type]||[1,3];
    let plassert=false;
    // Prøv foretrukne dager først
    for(const di of pref){
      if(plan[di].length<dagMaks[di]&&!booked.includes(di)){
        plan[di].push(item);
        spillerDager[pid]=[...booked,di];
        plassert=true;break;
      }
    }
    // Fallback: alle tilgjengelige dager
    if(!plassert){
      for(const di of[1,3,4]){
        if(plan[di].length<dagMaks[di]&&!booked.includes(di)){
          plan[di].push(item);spillerDager[pid]=[...(spillerDager[pid]||[]),di];break;
        }
      }
    }
  });
  return plan;
}

function byggSamtaleHistorikk(p,convs){
  if(!convs.length)return'Ingen samtaler registrert.';
  return convs.map(function(c,i){
    var malTekst=(c.mal||[]).map(function(m){
      var t='- '+m.tittel+(m.spillfase?' ('+m.spillfase+')':'')+' ['+m.prioritet+', '+(m.kategori||'fotball')+']';
      if(m.kortbeskrivelse)t+=': '+m.kortbeskrivelse;
      return t;
    }).join('; ');
    return 'Samtale '+(i+1)+' ('+c.dato+') - '+(c.type||'Spillersamtale')+': '+(c.notat?'Notat: '+c.notat+'. ':'')+''+(malTekst||'Ingen mal.');
  }).join(' ||| ');
}

    var em=div({className:'empty'});em.appendChild(div({className:'empty-ikon'},'📈'));
    em.appendChild(el('h3',{},'Ingen samtaler ennå'));
    em.appendChild(el('p',{},'Registrer minst 2 samtaler for å se trender.'));
    wrap.appendChild(em);return page;
  }

  // ── 1. AI-ANALYSE – HOVEDELEMENTET ─────────────────────────────────────────
  var aiSeksjon=div({style:{marginBottom:'20px'}});
  var aiHdr=div({style:{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'10px'}});
  var aiTittel=div({style:{fontSize:'10px',color:'#8e44ad',letterSpacing:'2px',textTransform:'uppercase'}});
  aiTittel.textContent='🤖 AI-analyse av samtalehistorikk';
  aiHdr.appendChild(aiTittel);
  aiSeksjon.appendChild(aiHdr);

  if(S.trenderAnalyse){
    var a=typeof S.trenderAnalyse==='string'?parseAnalyse(S.trenderAnalyse):S.trenderAnalyse;

    // Sjekk om vi har strukturert JSON eller ren tekst
    if(a.tekst){
      // ── Ren tekst-modus: vis pent formatert ────────────────────────────
      var txtKort=div({style:{background:'#fff',borderRadius:'14px',overflow:'hidden',boxShadow:'0 4px 20px rgba(91,44,140,.12)',marginBottom:'10px'}});

      // Toppstripe
      var stripe=div({style:{background:'linear-gradient(90deg,#5b2c8c,#8e44ad)',padding:'12px 18px',display:'flex',alignItems:'center',gap:'10px'}});
      stripe.appendChild(div({style:{fontSize:'18px'}},'🤖'));
      var sInfo=div({});
      sInfo.appendChild(div({style:{fontSize:'11px',fontWeight:'bold',color:'rgba(255,255,255,.9)',letterSpacing:'1px',textTransform:'uppercase'}},'AI-analyse'));
      sInfo.appendChild(div({style:{fontSize:'10px',color:'rgba(255,255,255,.6)'}},'Basert på '+convs.length+' samtaler med '+p.navn));
      stripe.appendChild(sInfo);txtKort.appendChild(stripe);

      // Tekst-innhold
      var txtBody=div({style:{padding:'20px 22px'}});
      var lines=a.tekst.split('\n');
      var seksjoner=[
        {søk:'gjentakende', ikon:'🔁', farge:'#e74c3c'},
        {søk:'positiv',     ikon:'📈', farge:'#27ae60'},
        {søk:'bekymring',   ikon:'⚠️', farge:'#f39c12'},
        {søk:'anbefaling',  ikon:'💡', farge:'#1A4B8C'},
      ];
      var paragraf='';
      lines.forEach(function(linje){
        var ll=linje.toLowerCase().trim();
        var erSeksjonsHdr=false;
        seksjoner.forEach(function(s){
          if(ll.startsWith(s.søk)||ll.indexOf(': ')>-1&&ll.indexOf(s.søk)>-1&&ll.indexOf(s.søk)<20){
            if(paragraf.trim()){
              var pt=document.createElement('p');pt.style.cssText='margin:0 0 16px 0;font-size:13px;color:#0B1F3A;line-height:1.85';pt.textContent=paragraf.trim();txtBody.appendChild(pt);paragraf='';
            }
            var hdr=div({style:{display:'flex',alignItems:'center',gap:'7px',margin:'0 0 6px 0',paddingTop:'4px'}});
            var iEl=div({style:{fontSize:'16px',flexShrink:0}});iEl.textContent=s.ikon;
            var kolon=linje.indexOf(':');
            var tittel=kolon>-1?linje.slice(0,kolon).replace(/^[0-9.)\s]+/,'').trim():linje.trim();
            var hTxt=div({style:{fontSize:'12px',fontWeight:'bold',color:s.farge,textTransform:'uppercase',letterSpacing:'1px'}});hTxt.textContent=tittel;
            hdr.appendChild(iEl);hdr.appendChild(hTxt);txtBody.appendChild(hdr);
            if(kolon>-1) paragraf=linje.slice(kolon+1).trim();
            erSeksjonsHdr=true;
          }
        });
        if(!erSeksjonsHdr&&linje.trim()) paragraf+=' '+linje.trim();
      });
      if(paragraf.trim()){var pt=document.createElement('p');pt.style.cssText='margin:0;font-size:13px;color:#0B1F3A;line-height:1.85';pt.textContent=paragraf.trim();txtBody.appendChild(pt);}
      txtKort.appendChild(txtBody);aiSeksjon.appendChild(txtKort);

    } else {
      // ── Strukturert JSON-modus ──────────────────────────────────────────
      var topRad=div({style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'10px',marginBottom:'10px'}});
      function lagKort2(ikon,tittel,farge,elementer,tomTekst){
        var k=div({style:{background:'#fff',borderRadius:'14px',padding:'16px',boxShadow:'0 4px 16px rgba(0,0,0,.06)',borderTop:'4px solid '+farge,minHeight:'120px'}});
        var h=div({style:{display:'flex',alignItems:'center',gap:'6px',marginBottom:'10px'}});
        h.appendChild(div({style:{fontSize:'18px'}},ikon));
        var ht=div({});
        ht.appendChild(div({style:{fontSize:'11px',fontWeight:'bold',color:farge,letterSpacing:'1px',textTransform:'uppercase'}},tittel));
        h.appendChild(ht);k.appendChild(h);
        if(!elementer||!elementer.length){
          var tom=div({style:{fontSize:'12px',color:'#C8D0DC',fontStyle:'italic',textAlign:'center',padding:'12px 0'}});tom.textContent=tomTekst;k.appendChild(tom);
        } else {
          elementer.forEach(function(e){
            var tekst=typeof e==='string'?e:(e.forklaring||e.tema||'');
            var antall=e.antall;
            var row=div({style:{padding:'7px 0',borderBottom:'1px solid #F2F4F8'}});
            var rI=div({style:{display:'flex',justifyContent:'space-between',alignItems:'flex-start',gap:'8px'}});
            var rT=div({style:{fontSize:'12px',color:'#0B1F3A',lineHeight:'1.6',flex:'1'}});rT.textContent=tekst;
            rI.appendChild(rT);
            if(antall){var ab=div({style:{padding:'1px 7px',borderRadius:'20px',background:farge+'14',border:'1px solid '+farge+'33',fontSize:'10px',color:farge,fontWeight:'bold',flexShrink:0,whiteSpace:'nowrap'}});ab.textContent=antall+'×';rI.appendChild(ab);}
            row.appendChild(rI);k.appendChild(row);
          });
        }
        return k;
      }
      topRad.appendChild(lagKort2('🔁','Gjentakende','#e74c3c',a.gjentakende,'Ingen gjentakende'));
      topRad.appendChild(lagKort2('⚠️','Bekymringer','#f39c12',a.bekymringer.map(function(b){return{forklaring:b};})||[],'Ingen bekymringer'));
      aiSeksjon.appendChild(topRad);
      if((a.positiv||[]).length){
        var pK=div({style:{background:'#fff',borderRadius:'14px',padding:'16px',boxShadow:'0 4px 16px rgba(39,174,96,.06)',borderTop:'4px solid #27ae60',marginBottom:'10px'}});
        var pH=div({style:{display:'flex',alignItems:'center',gap:'7px',marginBottom:'10px'}});
        pH.appendChild(div({style:{fontSize:'18px'}},'📈'));
        var pHt=div({});pHt.appendChild(div({style:{fontSize:'11px',fontWeight:'bold',color:'#27ae60',letterSpacing:'1px',textTransform:'uppercase'}},'Positiv utvikling'));
        pH.appendChild(pHt);pK.appendChild(pH);
        (a.positiv||[]).forEach(function(pt2){var p3=document.createElement('p');p3.style.cssText='margin:0 0 8px 0;font-size:12px;color:#0B1F3A;line-height:1.7';p3.textContent=pt2;pK.appendChild(p3);});
        aiSeksjon.appendChild(pK);
      }
      if(a.anbefaling){
        var anK=div({style:{background:'linear-gradient(135deg,#0B2265,#1A4B8C)',borderRadius:'14px',padding:'18px 20px',boxShadow:'0 6px 24px rgba(11,34,101,.2)',marginBottom:'10px'}});
        var anH=div({style:{display:'flex',alignItems:'center',gap:'8px',marginBottom:'10px'}});
        anH.appendChild(div({style:{fontSize:'20px'}},'💡'));
        var anHt=div({});anHt.appendChild(div({style:{fontSize:'11px',fontWeight:'bold',color:'#C9A84C',letterSpacing:'1px',textTransform:'uppercase'}},'Anbefaling til neste samtale'));
        anH.appendChild(anHt);anK.appendChild(anH);
        var anT=document.createElement('p');anT.style.cssText='margin:0;font-size:14px;color:#fff;line-height:1.9';anT.textContent=a.anbefaling;anK.appendChild(anT);
        aiSeksjon.appendChild(anK);
      }
    }

    var nyBtn=btn({style:{width:'100%',padding:'9px',borderRadius:'9px',border:'1px solid #C8D0DC',background:'#fff',color:'#7A8FA8',fontSize:'12px',cursor:'pointer',fontFamily:'inherit'}},'🔄 Analyser på nytt');
    nyBtn.onclick=function(){setState({trenderAnalyse:null,trenderFeil:'',trenderLoading:false});};
    aiSeksjon.appendChild(nyBtn);
  } else if(S.trenderLoading){
    var loadKort=div({style:{background:'#fff',borderRadius:'14px',padding:'32px 22px',boxShadow:'0 4px 20px rgba(91,44,140,.10)',borderLeft:'5px solid #8e44ad',textAlign:'center'}});
    loadKort.appendChild(div({style:{fontSize:'28px',marginBottom:'10px'}},'🤖'));
    loadKort.appendChild(div({style:{fontSize:'14px',color:'#8e44ad',fontWeight:'bold',marginBottom:'6px'}},'Analyserer samtalehistorikk...'));
    loadKort.appendChild(div({style:{fontSize:'12px',color:'#7A8FA8'}},'Leser gjennom alle '+convs.length+' samtaler'));
    aiSeksjon.appendChild(loadKort);
  } else {
    // Invitasjon til analyse
    var invKort=div({style:{background:'#fff',borderRadius:'14px',padding:'22px',boxShadow:'0 4px 20px rgba(91,44,140,.08)',borderLeft:'5px solid #8e44ad',marginBottom:'10px'}});
    invKort.appendChild(div({style:{fontSize:'15px',fontWeight:'bold',color:'#0B1F3A',marginBottom:'6px'}},'Hva forteller samtalene?'));
    invKort.appendChild(div({style:{fontSize:'13px',color:'#7A8FA8',lineHeight:'1.8',marginBottom:'14px'}},'AI leser gjennom alle '+convs.length+' samtaler og gir deg konkrete innsikter om mønstre, fremgang, stagnasjoner og anbefaling til neste samtale.'));
    if(S.trenderFeil)invKort.appendChild(div({className:'alert alert-red',style:{marginBottom:'10px'}},'⚠️ '+S.trenderFeil));
    if(!S.apiKey){
      invKort.appendChild(div({className:'alert alert-yellow'},'Legg inn Groq API-nøkkel i ⚙️ for å aktivere AI-analyse.'));
    } else {
      var aBtn=btn({style:{width:'100%',padding:'13px',borderRadius:'10px',border:'none',background:'#8e44ad',color:'#fff',fontSize:'14px',cursor:'pointer',fontWeight:'bold',fontFamily:'inherit',boxShadow:'0 4px 16px rgba(142,68,173,.3)'}},'🤖 Start AI-analyse');
      aBtn.onclick=function(){kjorTrendAnalyse(p,convs);};
      invKort.appendChild(aBtn);
    }
    aiSeksjon.appendChild(invKort);
  }
  wrap.appendChild(aiSeksjon);

  // ── 2. GJENTAKENDE TEMAER ──────────────────────────────────────────────────
  var alleMal=convs.flatMap(function(c){return c.mal||[];});
  var temaMap={};
  alleMal.forEach(function(m){
    var nk=(m.tittel||'').toLowerCase().trim();if(!nk)return;
    if(!temaMap[nk])temaMap[nk]={tittel:m.tittel,ant:0,kat:m.kategori,fase:m.spillfase};
    temaMap[nk].ant++;
  });
  var gjentakende=Object.values(temaMap).filter(function(t){return t.ant>1;}).sort(function(a,b){return b.ant-a.ant;});
  if(gjentakende.length){
    wrap.appendChild(div({className:'section-lbl'},'🔁 Gjentakende temaer'));
    var gjCard=div({className:'card',style:{marginBottom:'14px',borderLeft:'4px solid #e74c3c'}});
    gjCard.appendChild(div({style:{fontSize:'12px',color:'#7A8FA8',marginBottom:'12px',lineHeight:'1.7'}},'Disse temaene dukker opp i flere samtaler – er det mangel på fremgang, eller bevisst prioritering?'));
    gjentakende.forEach(function(t){
      var kat=KATEGORIER.find(function(k){return k.id===t.kat;})||KATEGORIER[0];
      var row=div({style:{display:'flex',alignItems:'center',gap:'10px',padding:'10px 0',borderBottom:'1px solid #C8D0DC'}});
      row.appendChild(div({style:{fontSize:'18px'}},kat.ikon));
      var info=div({style:{flex:'1'}});
      info.appendChild(div({style:{fontSize:'14px',fontWeight:'bold',color:'#0B1F3A'}},t.tittel));
      if(t.fase)info.appendChild(div({style:{fontSize:'11px',color:'#7A8FA8',marginTop:'2px'}},'📍 '+t.fase));
      row.appendChild(info);
      var b=div({style:{padding:'4px 12px',borderRadius:'20px',background:'rgba(231,76,60,.1)',border:'1px solid rgba(231,76,60,.3)',fontSize:'12px',color:'#c0392b',fontWeight:'bold',flexShrink:0}});
      b.textContent=t.ant+'× samtaler';row.appendChild(b);gjCard.appendChild(row);
    });
    wrap.appendChild(gjCard);
  }

  // ── 3. NYTT I SISTE SAMTALE ───────────────────────────────────────────────
  var sorterte=[...convs].sort(function(a,b){return dagTall(a.dato)-dagTall(b.dato);});
  var sisteConv=sorterte[0];
  if(sisteConv){
    var tidligereTitler=new Set(convs.filter(function(c){return c.id!==sisteConv.id;}).flatMap(function(c){return c.mal||[];}).map(function(m){return(m.tittel||'').toLowerCase().trim();}));
    var nyeTemaer=(sisteConv.mal||[]).filter(function(m){return !tidligereTitler.has((m.tittel||'').toLowerCase().trim())&&m.tittel&&m.tittel.trim();});
    if(nyeTemaer.length){
      wrap.appendChild(div({className:'section-lbl'},'✨ Nytt i siste samtale ('+sisteConv.dato+')'));
      var nyCard=div({className:'card',style:{marginBottom:'14px',borderLeft:'4px solid #27ae60'}});
      nyCard.appendChild(div({style:{fontSize:'12px',color:'#7A8FA8',marginBottom:'10px'}},'Disse temaene ble diskutert for første gang:'));
      nyeTemaer.forEach(function(m){
        var kat2=KATEGORIER.find(function(k){return k.id===m.kategori;})||KATEGORIER[0];
        var row2=div({style:{display:'flex',alignItems:'center',gap:'10px',padding:'9px 0',borderBottom:'1px solid #C8D0DC'}});
        row2.appendChild(div({style:{fontSize:'18px'}},kat2.ikon));
        var txt=div({style:{flex:'1'}});
        txt.appendChild(div({style:{fontSize:'14px',fontWeight:'bold',color:'#0B1F3A'}},m.tittel));
        if(m.spillfase)txt.appendChild(div({style:{fontSize:'11px',color:'#7A8FA8',marginTop:'2px'}},'📍 '+m.spillfase));
        if(m.kortbeskrivelse)txt.appendChild(div({style:{fontSize:'12px',color:'#7A8FA8',marginTop:'2px'}},m.kortbeskrivelse));
        row2.appendChild(txt);
        var ny=div({style:{padding:'3px 9px',borderRadius:'20px',background:'rgba(39,174,96,.1)',border:'1px solid rgba(39,174,96,.3)',fontSize:'11px',color:'#27ae60',fontWeight:'bold',flexShrink:0}});
        ny.textContent='NY';row2.appendChild(ny);nyCard.appendChild(row2);
      });
      wrap.appendChild(nyCard);
    }
  }

  // ── 4. SAMTALETIDSLINJE ───────────────────────────────────────────────────
  wrap.appendChild(div({className:'section-lbl'},'Samtaletidslinje'));
  var tlCard=div({className:'card',style:{marginBottom:'14px'}});
  sorterte.forEach(function(c,i){
    var t0=SAMTALETYPER.find(function(x){return x.id===(c.type||'Spillersamtale');})||SAMTALETYPER[0];
    var row3=div({style:{display:'flex',alignItems:'flex-start',gap:'12px',paddingBottom:i<sorterte.length-1?'14px':'0',marginBottom:i<sorterte.length-1?'14px':'0',borderBottom:i<sorterte.length-1?'1px solid #C8D0DC':'none'}});
    var dot=div({style:{width:10,height:10,borderRadius:'50%',background:t0.farge,flexShrink:0,marginTop:'4px'}});
    var meta=div({style:{flex:'1'}});
    var tRow=div({style:{display:'flex',alignItems:'center',gap:'7px',marginBottom:'5px',flexWrap:'wrap'}});
    var tbadge=div({style:{padding:'3px 9px',borderRadius:'20px',background:t0.farge+'18',border:'1px solid '+t0.farge+'44',fontSize:'11px',color:t0.farge}});
    tbadge.textContent=t0.ikon+' '+t0.id;tRow.appendChild(tbadge);
    tRow.appendChild(el('span',{style:{fontSize:'11px',color:'#7A8FA8'}},'📅 '+c.dato));
    if(c.mal&&c.mal.length)tRow.appendChild(el('span',{style:{fontSize:'11px',color:'#7A8FA8'}},c.mal.length+' mål'));
    meta.appendChild(tRow);
    if((c.mal||[]).length){
      var malRad=div({style:{display:'flex',gap:'6px',flexWrap:'wrap',marginBottom:'4px'}});
      (c.mal||[]).forEach(function(m){
        var kat3=KATEGORIER.find(function(k){return k.id===m.kategori;})||KATEGORIER[0];
        var mb2=div({style:{display:'inline-flex',alignItems:'center',gap:'4px',padding:'2px 8px',borderRadius:'20px',background:kat3.farge+'12',border:'1px solid '+kat3.farge+'33',fontSize:'11px',color:kat3.farge}});
        mb2.textContent=kat3.ikon+' '+m.tittel;malRad.appendChild(mb2);
      });
      meta.appendChild(malRad);
    }
    if(c.notat){var n=div({style:{fontSize:'12px',color:'#7A8FA8',fontStyle:'italic',lineHeight:'1.6'}});n.textContent='"'+c.notat.slice(0,100)+(c.notat.length>100?'...':'')+'"';meta.appendChild(n);}
    row3.appendChild(dot);row3.appendChild(meta);tlCard.appendChild(row3);
  });
  wrap.appendChild(tlCard);

  // ── 5. KATEGORIFORDELING – kompakt og sekundær ────────────────────────────
  var totMal=alleMal.length||1;
  var katTeller={fotball:0,kultur:0,mentalitet:0,fysisk:0};
  alleMal.forEach(function(m){var k=m.kategori||'fotball';katTeller[k]=(katTeller[k]||0)+1;});
  var katHdr=div({style:{fontSize:'10px',color:'#7A8FA8',letterSpacing:'2px',textTransform:'uppercase',marginBottom:'8px'}});
  katHdr.textContent='Fordeling over alle samtaler';wrap.appendChild(katHdr);
  var katRow=div({style:{display:'flex',gap:'8px',marginBottom:'20px',flexWrap:'wrap'}});
  KATEGORIER.forEach(function(k){
    var ant=katTeller[k.id]||0;var pst=Math.round((ant/totMal)*100);
    var chip=div({style:{display:'inline-flex',alignItems:'center',gap:'5px',padding:'5px 12px',borderRadius:'20px',background:k.farge+'12',border:'1px solid '+k.farge+'33',fontSize:'12px',color:k.farge}});
    chip.textContent=k.ikon+' '+k.lbl+': '+ant+(pst>0?' ('+pst+'%)':'');
    katRow.appendChild(chip);
  });
  wrap.appendChild(katRow);

  wrap.appendChild(div({className:'footer'},'STABÆK FOTBALL · G17 · KONFIDENSIELT'));
  return page;
}


function rensAnalyse(raw){
  var t=(raw||"").split("**").join("").split("*").join("");
  var enIdx=t.indexOf(" 1. ");
  if(enIdx>0&&t.slice(0,enIdx).toLowerCase().indexOf("samtalehistorikken")!==-1){
    t=t.slice(enIdx+1);
  }
  [" 4. "," 3. "," 2. "].forEach(function(n){
    t=t.split(n).join("\n"+n.trim()+" ");
  });
  t=t.split("\n").map(function(l){
    l=l.trim();
    if(l.length>3&&l[1]==="."&&l[2]===" "&&"1234".indexOf(l[0])!==-1) l=l.slice(3);
    return l;
  }).filter(function(l){return l.length>0;}).join("\n");
  t=t.split("\n").map(function(l){
    return l.indexOf("- ")===0?"• "+l.slice(2):l;
  }).join("\n");
  return t.replace(/  +/g," ").trim();
}

function parseAnalyse(raw){
  var ji=raw.indexOf("{"),je=raw.lastIndexOf("}");
  if(ji!==-1&&je>ji){
    try{var obj=JSON.parse(raw.slice(ji,je+1));if(obj.gjentakende||obj.anbefaling)return obj;}catch(e){}
  }
  return {tekst: rensAnalyse(raw)};
}

function kjorTrendAnalyse(p,convs){
  if(!S.apiKey){setState({trenderFeil:'Ingen API-nøkkel.'});return;}
  setState({trenderLoading:true,trenderFeil:'',trenderAnalyse:null});
  var historikk=byggSamtaleHistorikk(p,convs);
  var prompt='Du er spillerutviklingsekspert for Stabæk G17. Analyser samtalehistorikken til '+p.navn+' ('+p.posisjon+'): '+historikk+' Gi en konkret analyse med disse delene: 1) GJENTAKENDE TEMAER: hva gar igjen i flere samtaler? 2) POSITIV UTVIKLING: hva endrer seg til det bedre? 3) BEKYMRINGER: hva henger igjen uten fremgang? 4) ANBEFALING NESTE SAMTALE: 1-2 konkrete forslag. Vaer kortfattet og handlingsorientert pa norsk.';
  fetch('https://api.groq.com/openai/v1/chat/completions',{
    method:'POST',
    headers:{'Content-Type':'application/json','Authorization':'Bearer '+S.apiKey},
    body:JSON.stringify({model:'llama-3.3-70b-versatile',max_tokens:600,temperature:0.3,messages:[{role:'user',content:prompt}]})
  }).then(function(r){return r.json();}).then(function(json){
    if(json.error)throw new Error(json.error.message||String(json.error));
    var tekst=(json.choices&&json.choices[0]&&json.choices[0].message&&json.choices[0].message.content)||'';
    setState({trenderLoading:false,trenderAnalyse:tekst});
  }).catch(function(err){setState({trenderLoading:false,trenderFeil:err.message});});
}

render();
